spring:
  application:
    name: financas-seguranca

  datasource:
    url: ${AWS_RDS_URL:jdbc:mysql://localhost:3306/financasdb?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${AWS_RDS_USER:admin}
    password: ${AWS_RDS_PASSWORD:admin}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQL8Dialect
        use_sql_comments: true
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
jwt:
  key:
    public: classpath:app.key.pub
    private: classpath:app.key
  token:
    expiracao: 8

