server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: financas-api

  config:
    import: "optional:classpath:application-seguranca.yaml"

  cloud:
    aws:
      region: ${AWS_REGION:sa-east-1}
      credentials:
        access-key: ${AWS_CREDENTIALS_ACCESS_KEY:faketest}
        secret-key: ${AWS_CREDENTIALS_SECRET_KEY:faketest}
      s3:
        bucket:
          fatura: ${AWS_S3_BUCKET_FATURA:bucket_name:thianolima-financas-faturas-dev}
          extrato: ${AWS_S3_BUCKET_EXTRATO:bucket_name:thianolima-financas-extratos-dev}

  datasource:
    url: ${AWS_RDS_URL:jdbc:mysql://localhost:3306/financasdb?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${AWS_RDS_USER:admin}
    password: ${AWS_RDS_PASSWORD:admin}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQL8Dialect
        use_sql_comments: true
        format_sql: true

### CONFIG ACTUATOR
management:
  endpoints:
    web:
      exposure:
        include: health, beans
  endpoint:
    health:
      show-details: always
